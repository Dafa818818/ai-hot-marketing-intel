name: Update AI Intelligence

on:
  schedule:
    # Beijing time 09:07-12:52. GitHub scheduled jobs can be delayed or skipped
    # during busy periods, so we retry through the morning. The update script is
    # idempotent and exits without changes after the first successful daily run.
    - cron: "7,22,37,52 1-4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-ai-intelligence
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Refresh intelligence data
        run: node scripts/update-intel.mjs

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No page data changes. Weekend, holiday, or already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            issue_id="$(node -p "require('./data/index.json').latest")"
            coverage="$(node -p "require('./data/index.json').archives[0].coverageLabel")"
            git commit -m "AI intelligence ${issue_id}" -m "${coverage}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "issue_id=${issue_id}" >> "$GITHUB_OUTPUT"
            git push
          fi

      - name: Create version tag
        if: steps.commit.outputs.changed == 'true'
        run: |
          tag="ai-intel-${{ steps.commit.outputs.issue_id }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Version tag ${tag} already exists."
          else
            git tag -a "${tag}" -m "AI 热点与营销投放情报 ${{ steps.commit.outputs.issue_id }}"
            git push origin "${tag}"
          fi

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload static site
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4

      - name: Sync to Notion
        if: steps.commit.outputs.changed == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DATA_SOURCE_ID: ${{ secrets.NOTION_DAILY_DATA_SOURCE_ID }}
          NOTION_ITEMS_DATA_SOURCE_ID: ${{ secrets.NOTION_ITEMS_DATA_SOURCE_ID }}
          NOTION_KEYWORDS_DATA_SOURCE_ID: ${{ secrets.NOTION_KEYWORDS_DATA_SOURCE_ID }}
          NOTION_SKIP_IF_MISSING: "1"
        run: node scripts/sync-notion.mjs
